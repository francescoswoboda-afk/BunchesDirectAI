<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse handcrafted bouquets and floral products from Bunches Direct.">
  <title>Our Products | Bunches Direct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="products">
  <header class="products-topbar">
    <div class="home-header">
      <a class="home-brand" href="index.html" aria-label="Bunches Direct home">
        <img class="home-brand-logo" src="assets/my-logo.png" alt="Bunches Direct">
      </a>

      <nav class="home-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a class="is-active" href="products.html">Our Products</a>
        <a href="about.html">About Us</a>
      </nav>

      <div class="home-header-actions">
        <a class="home-cta" href="contact.html">Get in Touch</a>
        <a class="home-cart-link" href="cart.html" aria-label="Open cart">
          <svg class="home-cart-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M3 4h2l2.1 10.2a1 1 0 0 0 1 .8h9.6a1 1 0 0 0 1-.76L21 7H7.1" />
            <circle cx="10" cy="19" r="1.5" />
            <circle cx="17" cy="19" r="1.5" />
          </svg>
          <span class="home-cart-count" id="homeCartCount">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="products-hero-redesign">
      <div class="container products-hero-grid">
        <div class="products-hero-copy">
          <p class="products-kicker">Our Collection</p>
          <h1>The <span>Roses</span></h1>
          <p class="lead">Browse our top of the line roses, cultivated at high altitudes in Ecuador.</p>
        </div>
        <div class="products-hero-image" aria-hidden="true">
          <img src="assets/products/ALTAMIRA-.png" alt="Rose hero image" onerror="this.onerror=null;this.src='assets/flower-card.svg';">
        </div>
      </div>
    </section>

    <section class="section-pad products-content">
      <div class="container">
        <div class="toolbar">
          <label class="search-wrap product-search" for="productSearch">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M20 20l-3.5-3.5"></path>
            </svg>
            <input id="productSearch" type="search" placeholder="e.g. Free Spirit, Moody Blues, etc.">
          </label>
          <label class="products-color-wrap" for="productColorFilter">
            <select id="productColorFilter" aria-label="Filter by color">
              <option value="all">All Colors</option>
              <option value="red">Red</option>
              <option value="pink">Pink</option>
              <option value="white">White</option>
              <option value="yellow">Yellow</option>
              <option value="orange">Orange</option>
              <option value="peach">Peach</option>
            </select>
          </label>
        </div>

        <div id="productGrid" class="product-grid stagger-list" aria-live="polite"></div>
        <div id="productPagination" class="product-pagination" aria-live="polite"></div>
      </div>
    </section>

  </main>

  <script src="products-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
