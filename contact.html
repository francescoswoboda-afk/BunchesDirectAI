<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Get in touch with Bunches Direct for bouquet orders and floral services.">
  <title>Contact Us | Bunches Direct</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact">
  <header class="home-header">
    <a class="home-brand" href="index.html" aria-label="Bunches Direct home">
      <img class="home-brand-logo" src="assets/my-logo.png" alt="Bunches Direct">
    </a>

    <nav class="home-nav" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="products.html">Our Products</a>
      <a href="about.html">About Us</a>
    </nav>

    <button class="home-hamburger" id="homeHamburger" aria-label="Open navigation" aria-expanded="false" aria-controls="homeNavDrawer">
        <span></span><span></span><span></span>
      </button>
      <div class="home-header-actions">
      <a class="home-cta" href="contact.html">Get in Touch</a>
      <a class="home-cart-link" href="cart.html" aria-label="Open cart">
        <svg class="home-cart-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3 4h2l2.1 10.2a1 1 0 0 0 1 .8h9.6a1 1 0 0 0 1-.76L21 7H7.1" />
          <circle cx="10" cy="19" r="1.5" />
          <circle cx="17" cy="19" r="1.5" />
        </svg>
        <span class="home-cart-count" id="homeCartCount">0</span>
      </a>
    </div>
  </header>
  <div class="home-nav-drawer" id="homeNavDrawer" aria-hidden="true">
    <div class="home-nav-drawer-overlay" id="homeNavOverlay"></div>
    <nav class="home-nav-drawer-panel" aria-label="Mobile navigation">
      <button class="home-nav-drawer-close" id="homeNavClose" aria-label="Close navigation">&times;</button>
      <a href="index.html">Home</a>
      <a href="products.html">Our Products</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Get in Touch</a>
    </nav>
  </div>

  <main>
    <section class="section-pad page-hero">
      <div class="container narrow">
        <p class="contact-kicker">Let&apos;s talk flowers</p>
        <h1 class="contact-display">Contact <span>Bunches Direct</span></h1>
        <p class="lead">Tell us what you need and we will get back to you quickly with design options, pricing, and delivery details.</p>
      </div>
    </section>

    <section class="section-pad contact-content">
      <div class="container">
        <form id="contactForm" class="contact-form contact-form-centered" action="https://formsubmit.co/es@bunches-direct.com" method="POST">
          <input type="hidden" name="_subject" value="New contact request from Bunches Direct website">
          <input type="hidden" name="_captcha" value="false">

          <label for="companyName">Company Name</label>
          <input id="companyName" name="companyName" type="text" required>

          <label for="companyEmail">Company Email</label>
          <input id="companyEmail" name="companyEmail" type="email" required>

          <label for="companyPhone">Company Phone Number or WhatsApp</label>
          <input id="companyPhone" name="companyPhone" type="text" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required placeholder="Write your message here."></textarea>

          <button class="btn btn-solid" type="submit">Send Request</button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
